services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clarifi
      POSTGRES_USER: clarifi
      POSTGRES_PASSWORD: clarifi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clarifi -d clarifi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://clarifi:clarifi@postgres:5432/clarifi
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ENABLE_PGVECTOR: "true"
      SEED_ON_STARTUP: "true"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://clarifi:clarifi@postgres:5432/clarifi
      REDIS_URL: redis://redis:6379/0
      ENABLE_PGVECTOR: "true"
      ENVIRONMENT: development
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker -l info -Q workflows,connectors

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

