# render.yaml — deploy backend on Render free tier
services:
  - type: web
    name: clarifi-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard
