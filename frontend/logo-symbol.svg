<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="20" cy="20" r="18" fill="url(#bgGradient)"/>
  
  <!-- Stock chart line - GenZ style bold strokes -->
  <path d="M8 28 L14 22 L20 18 L26 14 L32 10" 
        stroke="#FFFFFF" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- Upward arrow indicator -->
  <path d="M28 8 L34 8 L34 14" 
        stroke="#FFFFFF" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Data points -->
  <circle cx="8" cy="28" r="2" fill="#FFFFFF"/>
  <circle cx="14" cy="22" r="2" fill="#FFFFFF"/>
  <circle cx="20" cy="18" r="2" fill="#FFFFFF"/>
  <circle cx="26" cy="14" r="2" fill="#FFFFFF"/>
  <circle cx="32" cy="10" r="2.5" fill="#FFFFFF"/>
  
  <!-- Small "C" letter integrated -->
  <text x="20" y="25" 
        font-family="Arial, sans-serif" 
        font-size="8" 
        font-weight="bold" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        opacity="0.7">C</text>
</svg>
